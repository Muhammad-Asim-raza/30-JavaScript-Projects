<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
       <script src="https://kit.fontawesome.com/e2c231ac74.js" crossorigin="anonymous"></script>

<body>
  <div class="container">
    <form>
      <div class="icon">
      <i class="fas fa-paper-plane"></i>
</div>
      <div class="input-group">
        <label>Full Name </label>
        <input type="text" placeholder="Enter your name" id="name" onkeyup="namevalidate()">
        <span id="name-error"></span>
      </div>
      <div class="input-group">
        <label>Phone No.</label>
        <input type="tel" placeholder="123 456 7890" id="telephone" onkeyup="telValidate()">
        <span id="tel-error"></span>
      </div>

      <div class="input-group">
        <label>Email Id</label>
        <input type="email" placeholder="Enter Email" id="email" onkeyup="emailValidate()">
        <span id="email-error"></span>
      </div>   

      <div class="input-group">
        <label>Your Message</label>
        <textarea rows="5" placeholder="Enter your message" id="message" onkeyup="textValidate()"></textarea>
        <span id="message-error"></span>
      </div>

    <button onclick="return validateForm()">Submit</button>
    <span id="submit-error"></span>
  </form>
  </div>
   <script src="script.js"></script>
</body>
</html>
