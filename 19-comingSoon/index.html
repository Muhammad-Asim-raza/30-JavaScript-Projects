<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="./images/logo.png" class="logo">
        <div class="content">
            <p>Website is under Maintainance</p>
            <h1>We're <span>Coming</span> Soon</h1>
            <div class="counter">
                <div>
                    <p id="day">00</p>
                    <span>days</span>
                </div>
                <div>
                    <p id="hours">00</p>
                    <span>hours</span>
                </div>
                <div>
                    <p id="minutes">00</p>
                    <span>minutes</span>
                </div>
                <div>
                    <p id="seconds">00</p>
                    <span>seconds</span>
                </div>
            </div>
            <button>Learn more <img src="./images/triangle.png"></button>
        </div>
        <div class="rocket">
            <img src="./images/rocket.png">
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
